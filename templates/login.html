<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" href="{{ url_for('static', filename='images/blackforest favicon.png') }}">
  <title>Login – SHADOWSYNC</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/shadowroot-theme.css') }}">
</head>
<body>
  <img src="{{ url_for('static', filename='images/shadow sync logo.png') }}" class="logo" alt="Logo">
  <h1>SHADOWSYNC</h1>
  <h2>Login</h2>

  {% with messages = get_flashed_messages(with_categories=true) %}
    {% for category, message in messages %}
      <div class="flash">{{ message }}</div>
    {% endfor %}
  {% endwith %}

  <form method="post">
  <div class="container">
    <input required type="text" name="username" class="input">
    <label class="label">Username</label>
  </div>

  <div class="container">
    <input required type="password" name="password" class="input">
    <label class="label">Password</label>
  </div>

  <button type="submit">Login</button>
</form>

</body>
</html>
